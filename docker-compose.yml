services:
  endee:
    image: endeeio/endee-server:latest
    ports:
      - "8080:8080"
    volumes:
      - endee-data:/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Endee Atlas
      ENDEE_BASE_URL: http://endee:8080/api/v1
      ENDEE_INDEX_NAME: talentforge_hiring
      VECTOR_STORE_BACKEND: endee
      EMBEDDING_BACKEND: hash
      ENDEE_BOOTSTRAP_TIMEOUT_SECONDS: "30"
      ENDEE_BOOTSTRAP_INTERVAL_SECONDS: "1.5"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SEED_SAMPLE_DATA: "true"
    depends_on:
      - endee
    restart: unless-stopped

volumes:
  endee-data:
